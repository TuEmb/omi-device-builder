# ---- Omi Device Builder: common configuration ----
# Board-specific overlays/confs live in boards/<board>.{conf,overlay}
# and set CONFIG_BT_DEVICE_NAME="omi-<device>".

# --- App features ---
CONFIG_OMI_CODEC_OPUS=y
CONFIG_OMI_ENABLE_BATTERY=y
CONFIG_OMI_ENABLE_BUTTON=y
CONFIG_OMI_ENABLE_LED=y

# --- Drivers ---
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_POWEROFF=y

# --- Bluetooth (peripheral, audio streaming) ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="omi-xiao"
CONFIG_BT_DEVICE_APPEARANCE=832
CONFIG_BT_DIS=y
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="1.0.0"
CONFIG_BT_BAS=y
CONFIG_BT_SMP=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y

# --- BLE throughput (2M PHY + DLE + large MTU), matched to the omi firmware ---
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_AUTO_PHY_UPDATE=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_PHY_2M=y

# --- System ---
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192
