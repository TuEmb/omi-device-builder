# MCUboot image tuning for omi-xiao52.
#
# No hardware UART console (also fixes a uart_console link error and shrinks
# the bootloader). Serial recovery talks over USB CDC instead.
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n

# USB-C serial recovery (mcumgr over USB CDC).
# Entered by pressing the RESET button: a pin reset drops into serial recovery,
# while power-on and soft resets (e.g. after a BLE OTA) boot the app normally.
# Also auto-entered if slot0 has no valid image, so a bad update can't brick it.
# Normal updates go over BLE (app SMP-BT); USB-C is the wired/recovery path.
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_CDC_ACM=y
CONFIG_BOOT_SERIAL_PIN_RESET=y
CONFIG_BOOT_SERIAL_NO_APPLICATION=y
# No GPIO button entrance (would require a `mcuboot_button0` node) or LED.
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_MCUBOOT_INDICATION_LED=n
