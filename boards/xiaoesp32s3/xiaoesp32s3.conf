# Seeed XIAO ESP32S3 Sense  ->  board: xiao_esp32s3/esp32s3/procpu
CONFIG_BT_DEVICE_NAME="omi-xiaoesp32s3"

# ESP32-S3 PDM mic has no Zephyr driver yet -> build BLE-only for now.
CONFIG_OMI_MIC=n

# The ESP32 BT controller requires Espressif binary blobs
# (`west blobs fetch hal_espressif`). Until those are present, build the BT HCI
# driver WITHOUT blobs so the image still compiles.
# NOTE: this is a build-only config — BLE will NOT work on real hardware until
# you fetch the blobs and remove this line.
CONFIG_BUILD_ONLY_NO_BLOBS=y

# XIAO ESP32S3 has a single user LED (not RGB) -> disable the RGB status LED.
CONFIG_OMI_LED=n

# ESP32-S3 uses its own BLE controller (NOT the Nordic BT_LL_SW_SPLIT), so no
# CONFIG_BT_CTLR_* knobs here; 2M PHY / DLE are requested by the host at runtime.
#
# TODO(verify) before building:
#   1. Fetch Espressif blobs:  west blobs fetch hal_espressif
#   2. Confirm your Zephyr has a PDM/DMIC driver for ESP32-S3 and wire the
#      `dmic-dev` alias to it in boards/xiaoesp32s3.overlay (the S3 Sense mic is
#      a PDM MSM261D3526H1CPM). If no dmic driver exists, mic capture needs an
#      I2S-PDM-RX shim.
#   3. Confirm battery-sense ADC channel/divider for your board revision.
