# Seeed XIAO MG24 (Sense)  ->  board: xiao_mg24 (Silicon Labs EFR32MG24)
# TODO(verify): confirm the exact board target in your Zephyr:
#   west boards | grep mg24     (e.g. xiao_mg24/efr32mg24b220f1536im48)
CONFIG_BT_DEVICE_NAME="omi-xiaomg24"

# EFR32MG24 uses the Silicon Labs BLE controller (NOT the Nordic BT_LL_SW_SPLIT),
# so no CONFIG_BT_CTLR_* knobs here. 2M PHY / DLE are requested by the host at
# runtime; the Silabs controller advertises its own buffer limits.
#
# TODO(verify): confirm your Zephyr enables the Silabs BLE controller for this
# board (CONFIG_BT + hci_silabs).
# MIC: the XIAO MG24 Sense mic (MSM381ACT001) is ANALOG (DATA=PC9, PWR=PC8), not
# PDM — it needs a 16 kHz ADC-sampling backend, not the DMIC src/mic.c. See
# boards/xiaomg24.overlay.

# XIAO MG24 has a single user LED (not RGB) -> disable the RGB status LED.
# TODO(verify): if your board revision exposes an RGB LED, re-enable and add the
# pwmleds nodes in boards/xiaomg24.overlay.
CONFIG_OMI_ENABLE_LED=n
