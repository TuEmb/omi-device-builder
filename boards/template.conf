# Board template — copy to boards/<yourboard>.conf.
#
# Most components auto-enable from the devicetree (see <yourboard>.overlay), so
# this file usually only needs the BLE name. Add overrides here when the DT
# can't express your intent.

# Required: the BLE advertised name (artifact becomes omi-<yourboard>).
CONFIG_BT_DEVICE_NAME="omi-yourboard"

# --- Optional overrides ---

# Analog mic (no PDM): select the ADC backend and skip the dmic-dev alias.
# CONFIG_OMI_MIC_BACKEND_ADC=y

# Force a component off even though the hardware exists (e.g. bring-up):
# CONFIG_OMI_BATTERY=n
# CONFIG_OMI_BUTTON=n

# SD disk name (must match the devicetree sdmmc-disk `disk-name`):
# CONFIG_OMI_STORAGE_SD_DISK_NAME="SD"

# BLE-only placeholder board (mic/LED driver not ready yet):
# CONFIG_OMI_MIC=n
# CONFIG_OMI_LED=n

# --- Nordic (BT_LL_SW_SPLIT) controller throughput knobs, if applicable ---
# CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
# CONFIG_BT_CTLR_PHY_2M=y
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
