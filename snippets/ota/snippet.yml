name: ota
# BLE OTA (MCUboot signed image + mcumgr SMP-BT). Build with --sysbuild so the
# MCUboot bootloader image is built too (see sysbuild.conf / sysbuild/).
# Board-specific flash partitions are NOT here — they live in
# boards/<board>/ota.overlay and are passed by scripts/build_ota.*
append:
  EXTRA_CONF_FILE: ota.conf
