# ---- OTA over BLE: MCUboot image + mcumgr SMP transport ----
# Applied by the `ota` snippet. Build with `west build --sysbuild ... -S ota`
# so the MCUboot bootloader (sysbuild.conf / sysbuild/) is built alongside.
# The matching flash layout is in this snippet's boards/<board>.overlay.

# Build the app as a MCUboot-signed image (adds the image header/trailer and
# links into slot0).
CONFIG_BOOTLOADER_MCUBOOT=y

# mcumgr core + SMP-over-Bluetooth transport (auto-registers a GATT service).
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y

# Management groups: image upload/swap + OS (needed for reset after DFU).
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# Flash / image plumbing used by the image group.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# Serialization deps (usually auto-selected, pinned here for clarity).
CONFIG_ZCBOR=y
CONFIG_NET_BUF=y
CONFIG_CRC=y

# Let the app mark a freshly-swapped image as confirmed on a healthy boot so
# MCUboot does not revert it (simple test-then-confirm from the phone still
# works; this just avoids an accidental revert if the app forgets to confirm).
CONFIG_MCUBOOT_IMG_MANAGER=y
