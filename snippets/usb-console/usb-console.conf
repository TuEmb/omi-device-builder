# USB CDC ACM console: firmware logs stream out the Type-C port so a user can
# watch them with any serial terminal (no J-Link/RTT needed).
#
# The xiao_ble board already chooses console = board_cdc_acm_uart (a cdc-acm-uart
# node on the default device_next USB stack). Auto-create + enumerate that CDC
# ACM instance at boot so the port comes up on its own; console/LOG output then
# flows to it. (Also clears the idle "udc: Failed to allocate net_buf" noise
# that appeared when the CDC console existed but USB was never enabled.)
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_LOG_BACKEND_UART=y
